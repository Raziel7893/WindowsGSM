name: Build
on: [push, pull_request]

jobs:
  Build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Build
      run: dotnet build WindowsGSM.sln --verbosity minimal
